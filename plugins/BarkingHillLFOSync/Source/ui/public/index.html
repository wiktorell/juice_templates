<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BarkingHillLFOSync</title>

  <style>
    /* ─── WebView constraints ─────────────────── */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      cursor: default;
      overflow: hidden;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* ─── Plugin shell — fills WebView exactly ── */
    .plugin-shell {
      position: relative;
      width: 700px;
      height: 390px;
      color: #c49564;
      background: radial-gradient(ellipse at 50% 40%, #4a3a2a 0%, #3a2810 40%, #2a1a0a 100%);
      z-index: 1;
    }

    /* ─── Scan-line overlay ───────────────────── */
    .plugin-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
    }

    /* ─── Corner vignette ────────────────────── */
    .plugin-shell::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 99;
      background: radial-gradient(ellipse at center,
        transparent 50%,
        rgba(0,0,0,0.55) 100%
      );
    }

    /* ══════════════════════════════════════════
       WAVEFORM DISPLAY
       x=15, y=15, 670x185px
    ══════════════════════════════════════════ */
    .display-housing {
      position: absolute;
      left: 15px;
      top: 15px;
      width: 670px;
      height: 185px;
      background: #0e0700;
      border: 3px solid #3a2a1a;
      border-radius: 4px;
      box-shadow:
        inset 0 4px 24px rgba(0,0,0,0.95),
        inset 0 0 80px rgba(0,0,0,0.6),
        0 2px 8px rgba(0,0,0,0.8);
      overflow: hidden;
    }

    /* CRT scan lines over display */
    .display-housing::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
    }

    /* Display edge vignette */
    .display-housing::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 11;
      background: radial-gradient(ellipse at center,
        transparent 55%,
        rgba(0,0,0,0.7) 100%
      );
    }

    #waveformCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .display-title {
      position: absolute;
      top: 10px;
      left: 14px;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #c49564;
      opacity: 0.7;
      z-index: 12;
      pointer-events: none;
    }

    .display-bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(to right,
        transparent 0%,
        rgba(212,165,116,0.15) 30%,
        rgba(212,165,116,0.25) 50%,
        rgba(212,165,116,0.15) 70%,
        transparent 100%
      );
      z-index: 12;
      pointer-events: none;
    }

    /* ══════════════════════════════════════════
       CONTROLS ROW
       top: 215px — sits below display
    ══════════════════════════════════════════ */
    .controls-row {
      position: absolute;
      top: 215px;
      left: 0;
      width: 700px;
      height: 165px;
      display: flex;
      align-items: flex-start;
      padding: 0 20px;
      gap: 0;
    }

    /* ─── Knob group ─────────────────────────── */
    .knob-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }

    .knob-group.main {
      width: 90px;
      margin-right: 15px;
    }

    .knob-group.main.waveform {
      margin-right: 30px;
    }

    .knob-group.cc {
      width: 60px;
      margin-right: 0;
    }

    /* Knob element */
    .knob {
      border-radius: 50%;
      position: relative;
      cursor: ns-resize;
      flex-shrink: 0;
      background: radial-gradient(circle at 38% 35%,
        #4a3820 0%,
        #3a2a1a 30%,
        #2f2015 60%,
        #1a0a00 100%
      );
      box-shadow:
        0 5px 15px rgba(0,0,0,0.85),
        0 2px 6px rgba(0,0,0,0.7),
        0 1px 2px rgba(0,0,0,0.9),
        inset 0 1px 0 rgba(212,165,116,0.12),
        inset 0 -1px 0 rgba(0,0,0,0.6);
      transition: transform 0.06s ease;
      will-change: transform;
    }

    .knob.main {
      width: 90px;
      height: 90px;
    }

    .knob.small {
      width: 60px;
      height: 60px;
    }

    .knob:hover {
      transform: scale(1.005);
    }

    .knob:active {
      transform: scale(0.995);
    }

    .knob::before {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.5);
      pointer-events: none;
    }

    .knob::after {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 1px solid rgba(212,165,116,0.08);
      pointer-events: none;
    }

    /* Gold indicator bar */
    .knob-indicator {
      position: absolute;
      width: 4px;
      border-radius: 2px;
      background: linear-gradient(to bottom, #e8c088 0%, #d4a574 50%, #b88040 100%);
      box-shadow: 0 0 4px rgba(212,165,116,0.6), 0 0 8px rgba(212,165,116,0.3);
      transform-origin: bottom center;
      pointer-events: none;
      bottom: 50%;
      left: 50%;
    }

    .knob-indicator.main {
      height: 35px;
      margin-left: -2px;
    }

    .knob-indicator.small {
      height: 22px;
      margin-left: -2px;
    }

    .knob-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #c49564;
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      white-space: nowrap;
      margin-top: 2px;
    }

    .knob-value {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: #a07848;
      text-align: center;
      text-shadow: 0 1px 2px rgba(0,0,0,0.9);
      min-height: 14px;
      white-space: nowrap;
      margin-bottom: 4px;
    }

    /* ─── Toggle switches ────────────────────── */
    .toggle-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-right: 23px;
    }

    .toggle-label-top,
    .toggle-label-bot {
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #a07848;
      text-align: center;
      line-height: 1;
    }

    .toggle-switch {
      width: 32px;
      height: 80px;
      background: #0e0700;
      border: 2px solid #3a2a1a;
      border-radius: 16px;
      position: relative;
      cursor: pointer;
      box-shadow:
        inset 0 3px 10px rgba(0,0,0,0.9),
        inset 0 0 20px rgba(0,0,0,0.5),
        0 2px 6px rgba(0,0,0,0.7);
      transition: border-color 0.2s ease;
    }

    .toggle-switch:hover {
      border-color: #4a3828;
    }

    /* The brass ball slider */
    .toggle-ball {
      position: absolute;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%,
        #f0d090 0%,
        #d4a574 40%,
        #a07030 80%,
        #7a5020 100%
      );
      box-shadow:
        0 3px 8px rgba(0,0,0,0.8),
        0 1px 3px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,230,160,0.4);
      transition: top 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Off state: ball at bottom */
    .toggle-ball {
      top: calc(100% - 25px);
    }

    /* On state: ball at top */
    .toggle-switch.active .toggle-ball {
      top: 3px;
    }

    .toggle-group .knob-label {
      font-size: 9px;
    }

    /* ─── CC Knob group ──────────────────────── */
    .cc-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-right: 30px;
      margin-top: 15px;
    }


    /* ══════════════════════════════════════════
       BRAND NAME — v7
       Right-aligned to window right edge: right:15px, bottom:18px
    ══════════════════════════════════════════ */
    .brand-name {
      position: absolute;
      right: 15px;
      bottom: 18px;
      text-align: right;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #c49564;
      white-space: nowrap;
      pointer-events: none;
      z-index: 50;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>

  <div class="plugin-shell">

    <!-- WAVEFORM DISPLAY -->
    <div class="display-housing">
      <canvas id="waveformCanvas"></canvas>
      <div class="display-title">LFO SYNC</div>
      <div class="display-bottom-bar"></div>
    </div>

    <!-- CONTROLS ROW -->
    <div class="controls-row">

      <!-- Rate knob -->
      <div class="knob-group main">
        <div class="knob main" id="knobRate">
          <div class="knob-indicator main" id="indRate"></div>
        </div>
        <div class="knob-label">RATE</div>
        <div class="knob-value" id="valRate">1.00 HZ</div>
      </div>

      <!-- Depth knob -->
      <div class="knob-group main">
        <div class="knob main" id="knobDepth">
          <div class="knob-indicator main" id="indDepth"></div>
        </div>
        <div class="knob-label">DEPTH</div>
        <div class="knob-value" id="valDepth">+50%</div>
      </div>

      <!-- Waveform knob -->
      <div class="knob-group main waveform">
        <div class="knob main" id="knobWaveform">
          <div class="knob-indicator main" id="indWaveform"></div>
        </div>
        <div class="knob-label">WAVEFORM</div>
        <div class="knob-value" id="valWaveform">SINE</div>
      </div>

      <!-- Sync toggle -->
      <div class="toggle-group" id="toggleGroupSync">
        <div class="toggle-label-top">CLOCK</div>
        <div class="toggle-switch" id="syncToggle">
          <div class="toggle-ball"></div>
        </div>
        <div class="toggle-label-bot" id="syncLabelBot">FREE</div>
        <div class="knob-label" style="margin-top:4px; font-size:9px;">SYNC</div>
      </div>

      <!-- Retrigger toggle -->
      <div class="toggle-group" id="toggleGroupRetrig" style="margin-right: 21px;">
        <div class="toggle-label-top">ON</div>
        <div class="toggle-switch" id="retrigToggle">
          <div class="toggle-ball"></div>
        </div>
        <div class="toggle-label-bot">OFF</div>
        <div class="knob-label" style="margin-top:4px; font-size:9px;">RETRIG</div>
      </div>

      <!-- CC knob -->
      <div class="cc-group">
        <div class="knob small" id="knobCC">
          <div class="knob-indicator small" id="indCC"></div>
        </div>
        <div class="knob-label" style="font-size:9px;">CC</div>
        <div class="knob-value" id="valCC">CC 1</div>
      </div>


    </div><!-- /.controls-row -->

    <!-- BRAND NAME — v7: right-aligned, right:15px, bottom:18px -->
    <div class="brand-name">Barking Hill</div>

  </div><!-- /.plugin-shell -->

  <!--
    JUCE 8 WebView integration.
    index.js is served from BinaryData via the resource provider.
    Must use type="module" (ES6 exports).
  -->
  <script type="module" src="./js/juce/index.js"></script>
  <script type="module">
    import { getSliderState, getToggleState } from './js/juce/index.js';

    // ════════════════════════════════════════════
    // Plugin namespace
    // ════════════════════════════════════════════
    window.barkingHillLFOSync = {};

    // ════════════════════════════════════════════
    // Disable context menu and drag (native feel)
    // ════════════════════════════════════════════
    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      return false;
    });
    document.addEventListener('dragstart', (e) => {
      e.preventDefault();
    });

    // ════════════════════════════════════════════
    // Constants
    // ════════════════════════════════════════════
    const WAVEFORMS = ['SINE', 'TRIANGLE', 'SQUARE', 'SAW UP', 'SAW DOWN'];
    const SUBDIVISIONS = [
      '4 BARS', '2 BARS', '1 BAR',
      '1/2', '1/2T', '1/4', '1/4T',
      '1/8', '1/8T', '1/16', '1/16T',
      '1/32', '1/32T'
    ];
    const MIN_ANGLE = -135;
    const MAX_ANGLE =  135;

    // ════════════════════════════════════════════
    // Local display state (mirrors C++ parameter values)
    // ════════════════════════════════════════════
    const display = {
      rate:           1.0,
      depth:          50.0,
      waveform:       0,
      sync:           false,
      retrigger:      false,
      cc_number:      1,
      playhead:       0,
      subdivisionIdx: 5,
    };

    // ════════════════════════════════════════════
    // Normalisation helpers
    // ════════════════════════════════════════════
    function normToAngle(norm) {
      return MIN_ANGLE + norm * (MAX_ANGLE - MIN_ANGLE);
    }

    function rateToNorm(rate)  { return (rate - 0.1) / (10.0 - 0.1); }
    function normToRate(n)     { return 0.1 + n * (10.0 - 0.1); }

    function depthToNorm(d)    { return (d + 100.0) / 200.0; }
    function normToDepth(n)    { return n * 200.0 - 100.0; }
    function depthToAngle(d)   { return (d / 100.0) * 135.0; }

    function waveformToNorm(idx) { return idx / 4.0; }
    function normToWaveformIdx(n) { return Math.round(n * 4.0); }

    function ccToNorm(cc)  { return (cc - 1) / 126.0; }
    function normToCC(n)   { return Math.round(n * 126.0) + 1; }

    // ════════════════════════════════════════════
    // Visual update helpers
    // ════════════════════════════════════════════
    function setIndicatorAngle(indicatorEl, angleDeg) {
      indicatorEl.style.transform = `rotate(${angleDeg}deg)`;
    }

    function updateRateDisplay() {
      const el = document.getElementById('valRate');
      if (display.sync) {
        el.textContent = SUBDIVISIONS[display.subdivisionIdx];
      } else {
        el.textContent = display.rate.toFixed(2) + ' HZ';
      }
    }

    function refreshAllVisuals() {
      // Rate
      const rateNorm = display.sync
        ? display.subdivisionIdx / 12.0
        : rateToNorm(display.rate);
      setIndicatorAngle(document.getElementById('indRate'), normToAngle(rateNorm));
      updateRateDisplay();

      // Depth
      setIndicatorAngle(document.getElementById('indDepth'), depthToAngle(display.depth));
      document.getElementById('valDepth').textContent =
        (display.depth >= 0 ? '+' : '') + Math.round(display.depth) + '%';

      // Waveform
      setIndicatorAngle(document.getElementById('indWaveform'), normToAngle(waveformToNorm(display.waveform)));
      document.getElementById('valWaveform').textContent = WAVEFORMS[display.waveform];

      // Sync toggle
      document.getElementById('syncToggle').classList.toggle('active', display.sync);

      // Retrigger toggle
      document.getElementById('retrigToggle').classList.toggle('active', display.retrigger);

      // CC
      setIndicatorAngle(document.getElementById('indCC'), normToAngle(ccToNorm(display.cc_number)));
      document.getElementById('valCC').textContent = 'CC ' + display.cc_number;

    }

    // ════════════════════════════════════════════
    // Send parameter change to C++
    // JUCE 8 native message bridge
    // ════════════════════════════════════════════
    function sendParameterChange(id, normalizedValue) {
      if (typeof window.__juce__postNativeAppMessage === 'function') {
        window.__juce__postNativeAppMessage(JSON.stringify({
          type: 'parameterChanged',
          id: id,
          value: normalizedValue
        }));
      }
    }

    // ════════════════════════════════════════════
    // Receive parameter updates from C++
    // C++ calls evaluateJavascript to fire this
    // ════════════════════════════════════════════
    window.barkingHillLFOSync.receiveParameterUpdate = function(id, normalizedValue) {
      switch (id) {
        case 'rate':
          display.rate = normToRate(normalizedValue);
          setIndicatorAngle(document.getElementById('indRate'), normToAngle(normalizedValue));
          updateRateDisplay();
          break;
        case 'depth':
          display.depth = normToDepth(normalizedValue);
          setIndicatorAngle(document.getElementById('indDepth'), depthToAngle(display.depth));
          document.getElementById('valDepth').textContent =
            (display.depth >= 0 ? '+' : '') + Math.round(display.depth) + '%';
          break;
        case 'waveform': {
          const idx = normToWaveformIdx(normalizedValue);
          display.waveform = idx;
          setIndicatorAngle(document.getElementById('indWaveform'), normToAngle(waveformToNorm(idx)));
          document.getElementById('valWaveform').textContent = WAVEFORMS[idx];
          break;
        }
        case 'sync':
          display.sync = normalizedValue >= 0.5;
          document.getElementById('syncToggle').classList.toggle('active', display.sync);
          updateRateDisplay();
          break;
        case 'retrigger':
          display.retrigger = normalizedValue >= 0.5;
          document.getElementById('retrigToggle').classList.toggle('active', display.retrigger);
          break;
        case 'cc_number':
          display.cc_number = normToCC(normalizedValue);
          setIndicatorAngle(document.getElementById('indCC'), normToAngle(ccToNorm(display.cc_number)));
          document.getElementById('valCC').textContent = 'CC ' + display.cc_number;
          break;
      }
    };

    // ════════════════════════════════════════════
    // JUCE parameter state objects (JUCE 8 native integration)
    // Relays are registered in C++ and exposed via index.js
    // ════════════════════════════════════════════

    // --- Rate (slider) ---
    const rateState = getSliderState('rate');
    if (rateState) {
      rateState.valueChangedEvent.addListener(() => {
        const n = rateState.getNormalisedValue();
        display.rate = normToRate(n);
        setIndicatorAngle(document.getElementById('indRate'), normToAngle(n));
        updateRateDisplay();
      });
    }

    // --- Depth (slider) ---
    const depthState = getSliderState('depth');
    if (depthState) {
      depthState.valueChangedEvent.addListener(() => {
        const n = depthState.getNormalisedValue();
        display.depth = normToDepth(n);
        setIndicatorAngle(document.getElementById('indDepth'), depthToAngle(display.depth));
        document.getElementById('valDepth').textContent =
          (display.depth >= 0 ? '+' : '') + Math.round(display.depth) + '%';
      });
    }

    // --- Waveform (slider used for Choice stepped knob) ---
    const waveformState = getSliderState('waveform');
    if (waveformState) {
      waveformState.valueChangedEvent.addListener(() => {
        const n = waveformState.getNormalisedValue();
        display.waveform = normToWaveformIdx(n);
        const snapped = waveformToNorm(display.waveform);
        setIndicatorAngle(document.getElementById('indWaveform'), normToAngle(snapped));
        document.getElementById('valWaveform').textContent = WAVEFORMS[display.waveform];
      });
    }

    // --- Sync (toggle) ---
    const syncState = getToggleState('sync');
    if (syncState) {
      syncState.valueChangedEvent.addListener(() => {
        display.sync = syncState.getValue();
        document.getElementById('syncToggle').classList.toggle('active', display.sync);
        updateRateDisplay();
      });
    }

    // --- Retrigger (toggle) ---
    const retriggerState = getToggleState('retrigger');
    if (retriggerState) {
      retriggerState.valueChangedEvent.addListener(() => {
        display.retrigger = retriggerState.getValue();
        document.getElementById('retrigToggle').classList.toggle('active', display.retrigger);
      });
    }

    // --- CC Number (slider, stepped integer) ---
    const ccNumberState = getSliderState('cc_number');
    if (ccNumberState) {
      ccNumberState.valueChangedEvent.addListener(() => {
        const n = ccNumberState.getNormalisedValue();
        display.cc_number = normToCC(n);
        setIndicatorAngle(document.getElementById('indCC'), normToAngle(ccToNorm(display.cc_number)));
        document.getElementById('valCC').textContent = 'CC ' + display.cc_number;
      });
    }


    // ════════════════════════════════════════════
    // Knob drag — relative delta pattern (JUCE 8 critical pattern #16)
    // Frame-delta: accumulates drag distance each frame, does NOT
    // track absolute cursor position.
    // ════════════════════════════════════════════
    let activeDrag = null;

    function setupKnob(knobEl, opts) {
      knobEl.addEventListener('mousedown', (e) => {
        e.preventDefault();
        activeDrag = {
          knob: knobEl,
          lastY: e.clientY,
          currentNorm: opts.getNorm(),
          opts
        };
      });
    }

    document.addEventListener('mousemove', (e) => {
      if (!activeDrag) return;
      const deltaY = activeDrag.lastY - e.clientY;  // relative, frame-to-frame
      activeDrag.lastY = e.clientY;
      const sensitivity = e.shiftKey ? 0.002 : 0.008;
      activeDrag.currentNorm = Math.max(0, Math.min(1, activeDrag.currentNorm + deltaY * sensitivity));
      activeDrag.opts.onNorm(activeDrag.currentNorm);
    });

    document.addEventListener('mouseup', () => {
      activeDrag = null;
    });

    // Rate knob
    setupKnob(document.getElementById('knobRate'), {
      getNorm: () => display.sync
        ? display.subdivisionIdx / 12.0
        : rateToNorm(display.rate),
      onNorm: (n) => {
        if (display.sync) {
          display.subdivisionIdx = Math.round(n * 12.0);
          setIndicatorAngle(document.getElementById('indRate'), normToAngle(display.subdivisionIdx / 12.0));
          updateRateDisplay();
          sendParameterChange('rate', display.subdivisionIdx / 12.0);
        } else {
          display.rate = normToRate(n);
          setIndicatorAngle(document.getElementById('indRate'), normToAngle(n));
          updateRateDisplay();
          if (rateState) rateState.setNormalisedValue(n);
          sendParameterChange('rate', n);
        }
      }
    });

    // Depth knob
    setupKnob(document.getElementById('knobDepth'), {
      getNorm: () => depthToNorm(display.depth),
      onNorm: (n) => {
        display.depth = normToDepth(n);
        setIndicatorAngle(document.getElementById('indDepth'), depthToAngle(display.depth));
        document.getElementById('valDepth').textContent =
          (display.depth >= 0 ? '+' : '') + Math.round(display.depth) + '%';
        if (depthState) depthState.setNormalisedValue(n);
        sendParameterChange('depth', n);
      }
    });

    // Waveform knob (stepped)
    setupKnob(document.getElementById('knobWaveform'), {
      getNorm: () => waveformToNorm(display.waveform),
      onNorm: (n) => {
        display.waveform = normToWaveformIdx(n);
        const snapped = waveformToNorm(display.waveform);
        setIndicatorAngle(document.getElementById('indWaveform'), normToAngle(snapped));
        document.getElementById('valWaveform').textContent = WAVEFORMS[display.waveform];
        if (waveformState) waveformState.setNormalisedValue(snapped);
        sendParameterChange('waveform', snapped);
      }
    });

    // CC knob (stepped integer)
    setupKnob(document.getElementById('knobCC'), {
      getNorm: () => ccToNorm(display.cc_number),
      onNorm: (n) => {
        display.cc_number = normToCC(n);
        const ccNorm = ccToNorm(display.cc_number);
        setIndicatorAngle(document.getElementById('indCC'), normToAngle(ccNorm));
        document.getElementById('valCC').textContent = 'CC ' + display.cc_number;
        if (ccNumberState) ccNumberState.setNormalisedValue(ccNorm);
        sendParameterChange('cc_number', ccNorm);
      }
    });

    // ════════════════════════════════════════════
    // Toggle switches
    // ════════════════════════════════════════════
    document.getElementById('syncToggle').addEventListener('click', () => {
      display.sync = !display.sync;
      document.getElementById('syncToggle').classList.toggle('active', display.sync);
      updateRateDisplay();
      const n = display.sync ? 1.0 : 0.0;
      if (syncState) syncState.setValue(display.sync);
      sendParameterChange('sync', n);
    });

    document.getElementById('retrigToggle').addEventListener('click', () => {
      display.retrigger = !display.retrigger;
      document.getElementById('retrigToggle').classList.toggle('active', display.retrigger);
      const n = display.retrigger ? 1.0 : 0.0;
      if (retriggerState) retriggerState.setValue(display.retrigger);
      sendParameterChange('retrigger', n);
    });


    // ════════════════════════════════════════════
    // Canvas waveform display (60fps requestAnimationFrame loop)
    // ════════════════════════════════════════════
    const canvas = document.getElementById('waveformCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const housing = canvas.parentElement;
      canvas.width  = housing.clientWidth;
      canvas.height = housing.clientHeight;
    }

    function sineWave(t)     { return Math.sin(2 * Math.PI * t); }
    function triangleWave(t) { return 1 - 4 * Math.abs(Math.round(t - 0.25) - (t - 0.25)); }
    function squareWave(t)   { return Math.sin(2 * Math.PI * t) >= 0 ? 1 : -1; }
    function sawUpWave(t)    { return 2 * (t - Math.floor(t + 0.5)); }
    function sawDownWave(t)  { return -sawUpWave(t); }

    const waveFunctions = [sineWave, triangleWave, squareWave, sawUpWave, sawDownWave];

    let lastTimestamp = null;

    function drawWaveform(timestamp) {
      if (!lastTimestamp) lastTimestamp = timestamp;
      const delta = (timestamp - lastTimestamp) / 1000;
      lastTimestamp = timestamp;

      const rate = display.sync ? 0.5 : display.rate;
      display.playhead = (display.playhead + delta * rate) % 1;

      const W = canvas.width;
      const H = canvas.height;

      ctx.clearRect(0, 0, W, H);

      // Grid lines
      ctx.strokeStyle = 'rgba(212,165,116,0.07)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, H / 2);
      ctx.lineTo(W, H / 2);
      ctx.stroke();
      [0.25, 0.75].forEach(f => {
        ctx.beginPath();
        ctx.moveTo(0, H * f);
        ctx.lineTo(W, H * f);
        ctx.stroke();
      });
      [0.25, 0.5, 0.75].forEach(f => {
        ctx.beginPath();
        ctx.moveTo(W * f, 0);
        ctx.lineTo(W * f, H);
        ctx.stroke();
      });

      const waveFunc = waveFunctions[display.waveform];
      const PAD_V = 22;
      const amplitude = (H / 2) - PAD_V;

      function buildWavePath() {
        ctx.beginPath();
        for (let px = 0; px < W; px++) {
          const t = px / W;
          const y = waveFunc(t);
          const cy = H / 2 - y * amplitude;
          if (px === 0) ctx.moveTo(px, cy);
          else ctx.lineTo(px, cy);
        }
      }

      // Outer glow
      ctx.save();
      ctx.filter = 'blur(3px)';
      ctx.strokeStyle = 'rgba(212,165,116,0.25)';
      ctx.lineWidth = 5;
      ctx.lineJoin = 'round';
      buildWavePath();
      ctx.stroke();
      ctx.restore();

      // Inner glow
      ctx.save();
      ctx.filter = 'blur(1px)';
      ctx.strokeStyle = 'rgba(212,165,116,0.45)';
      ctx.lineWidth = 3;
      ctx.lineJoin = 'round';
      buildWavePath();
      ctx.stroke();
      ctx.restore();

      // Primary line
      ctx.strokeStyle = '#d4a574';
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      buildWavePath();
      ctx.stroke();

      // Playhead
      const phX = display.playhead * W;
      const grad = ctx.createLinearGradient(phX, 0, phX, H);
      grad.addColorStop(0, 'rgba(212,165,116,0)');
      grad.addColorStop(0.3, 'rgba(212,165,116,0.5)');
      grad.addColorStop(0.5, 'rgba(212,165,116,0.8)');
      grad.addColorStop(0.7, 'rgba(212,165,116,0.5)');
      grad.addColorStop(1, 'rgba(212,165,116,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(phX, 0);
      ctx.lineTo(phX, H);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(212,165,116,0.9)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(phX, 0);
      ctx.lineTo(phX, H);
      ctx.stroke();

      // Playhead dot on waveform
      const phY = H / 2 - waveFunc(display.playhead) * amplitude;
      ctx.beginPath();
      ctx.arc(phX, phY, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#f0d090';
      ctx.fill();
      ctx.strokeStyle = '#d4a574';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Waveform name watermark
      ctx.fillStyle = 'rgba(212,165,116,0.12)';
      ctx.font = '500 52px Helvetica Neue, Helvetica, Arial, sans-serif';
      ctx.letterSpacing = '0.2em';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(WAVEFORMS[display.waveform], W / 2, H / 2);

      requestAnimationFrame(drawWaveform);
    }

    // ════════════════════════════════════════════
    // Boot
    // ════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
      resizeCanvas();
      refreshAllVisuals();
      requestAnimationFrame(drawWaveform);
    });

    window.addEventListener('error', (e) => {
      if (typeof window.__juce__postNativeAppMessage === 'function') {
        window.__juce__postNativeAppMessage(JSON.stringify({
          type: 'jsError',
          message: e.message,
          file: e.filename,
          line: e.lineno
        }));
      }
    });
  </script>
</body>
</html>
